<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pomodoro</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;background:black;color:white;font-family:-apple-system;text-align:center;}

.top{margin-top:20px;font-size:14px;opacity:0.8;}
.title{font-size:28px;margin:10px 0;}

.circle-wrap{position:relative;width:220px;height:220px;margin:20px auto;}
svg{transform:rotate(-90deg);width:220px;height:220px;}
circle{fill:none;stroke-width:12;}
.bg{stroke:#222;}
.progress{stroke:#3b82f6;stroke-dasharray:565.48;transition:1s linear;}

.timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
}

.btn{
background:#1f2937;
border-radius:20px;
padding:12px 18px;
margin:5px;
display:inline-block;
}

.section{margin-top:20px;font-size:18px;}
.subject-item{margin-top:5px;}
</style>
</head>

<body>

<div class="top" id="status">🔥 집중 | 🍅 0회 | 🔁 0사이클</div>
<div class="title">🍅 Pomodoro</div>

<div class="circle-wrap">
<svg>
<circle class="bg" cx="110" cy="110" r="90"/>
<circle id="progress" class="progress" cx="110" cy="110" r="90"/>
</svg>
<div class="timer" id="timer">25:00</div>
</div>

<div>
<span class="btn" onclick="toggle()">▶ 시작</span>
<span class="btn" onclick="resetAll()">🔄 초기화</span>
</div>

<div>
<span class="btn" onclick="skip()">⏭ 다음</span>
</div>

<div class="section">과목</div>

<input id="input" placeholder="과목 입력">
<div><span class="btn" onclick="add()">추가</span></div>
<div><span class="btn" onclick="clearAll()">🗑 전체삭제</span></div>

<div class="section">📊 공부시간</div>
<div><span class="btn" onclick="resetStudy()">🔄 공부시간 초기화</span></div>

<div id="list"></div>

<script>
let duration=1500;
let start=0;
let remain=1500;
let running=false;
let isBreak=false;
let pomo=0;
let cycle=0;

let subjects=JSON.parse(localStorage.getItem("subjects"))||{};
let current=null;
let lastTick=0;

/* 알림 */
function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
navigator.vibrate(300);
}
}

/* 시간 포맷 */
function fmt(t){
let m=Math.floor(t/60);
let s=t%60;
return m+":"+(s<10?"0":"")+s;
}

/* 업데이트 */
function update(){
timer.innerText=fmt(remain);
progress.style.strokeDashoffset=565.48*(1-remain/duration);

/* 공부시간 정확히 1초씩 */
let now=Date.now();
if(!isBreak && current && now-lastTick>=1000){
subjects[current]=(subjects[current]||0)+1;
lastTick=now;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

status.innerText=`🔥 집중 | 🍅 ${pomo}회 | 🔁 ${cycle}사이클`;
}

/* 루프 */
function loop(){
if(!running)return;

remain=duration-Math.floor((Date.now()-start)/1000);

if(remain<=0){
next();
return;
}

update();
requestAnimationFrame(loop);
}

/* 단계 전환 */
function next(){
if(!isBreak){
isBreak=true;
duration=300;
pomo++;
notify("휴식 시작");
}else{
isBreak=false;
cycle++;

if(pomo>=4){
notify("1사이클 완료");
running=false;
pomo=0;
cycle=0;
return;
}

duration=1500;
notify("다음 포모도로");
}

start=Date.now();
remain=duration;
loop();
}

/* 시작/정지 */
function toggle(){
if(running){
running=false;
}else{
start=Date.now()-(duration-remain)*1000;
running=true;
loop();
}
}

/* 전체 초기화 */
function resetAll(){
running=false;
duration=1500;
remain=1500;
isBreak=false;
pomo=0;
cycle=0;
subjects={};
localStorage.clear();
render();
update();
}

/* 스킵 (쉬는시간만) */
function skip(){
if(isBreak) next();
}

/* 과목 */
function add(){
let v=input.value;
if(!v)return;
subjects[v]=subjects[v]||0;
current=v;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function clearAll(){
subjects={};
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function resetStudy(){
for(let s in subjects)subjects[s]=0;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function del(s){
delete subjects[s];
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function render(){
list.innerHTML="";
for(let s in subjects){
list.innerHTML+=`
<div class="subject-item">
${s} ${Math.floor(subjects[s]/60)}분 
<button onclick="del('${s}')">삭제</button>
</div>`;
}
}

/* 권한 */
if(Notification.permission!=="granted"){
Notification.requestPermission();
}

render();
update();

/* SW */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
