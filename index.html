<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pomodoro</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
background:black;
color:white;
font-family:-apple-system;
text-align:center;
padding:10px;
}

/* 상단 */
.top{
font-size:14px;
opacity:0.7;
}

/* 타이틀 */
.title{
font-size:22px;
margin:5px;
}

/* 원형 */
.circle-wrap{
position:relative;
width:260px;
height:260px;
margin:15px auto;
}

svg{
transform:rotate(-90deg);
}

.timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
}

/* 버튼 */
.controls{
display:flex;
gap:10px;
justify-content:center;
}

.btn{
flex:1;
max-width:100px;
background:#1f2937;
padding:12px;
border-radius:12px;
}

.btn:active{
transform:scale(0.9);
background:#374151;
}

/* 리스트 */
#list{
margin-top:10px;
}
</style>
</head>

<body>

<div class="top" id="status">🔥 집중 | 🍅 0 | 🔁 0</div>
<div class="title">🍅 Pomodoro</div>

<div class="circle-wrap">
<svg width="260" height="260">
<circle cx="130" cy="130" r="100" stroke="#222" stroke-width="10" fill="none"/>
<circle id="progress" cx="130" cy="130" r="100" stroke="#3b82f6" stroke-width="10" fill="none"/>
</svg>
<div class="timer" id="timer">25:00</div>
</div>

<div class="controls">
<div class="btn" onclick="toggle()">▶</div>
<div class="btn" onclick="resetAll()">🔄</div>
<div class="btn" onclick="skip()">⏭</div>
</div>

<input id="input" placeholder="과목 입력">
<button onclick="add()">추가</button>
<button onclick="clearAll()">전체삭제</button>
<button onclick="resetStudy()">공부시간 초기화</button>

<div id="list"></div>

<script>
const circle=document.getElementById("progress");
const r=100;
const c=2*Math.PI*r;
circle.style.strokeDasharray=c;
circle.style.strokeDashoffset=0;

let state={
duration:1500,
remain:1500,
start:null,
running:false,
isBreak:false,
pomo:0,
cycle:0,
current:null
};

let subjects={};

function update(){
timer.innerText=format(state.remain);
circle.style.strokeDashoffset=c*(1-state.remain/state.duration);

status.innerText=`🔥 ${state.isBreak?"휴식":"집중"} | 🍅 ${state.pomo} | 🔁 ${state.cycle}`;
}

function loop(){
if(!state.running) return;

let now=Date.now();
state.remain=state.duration-Math.floor((now-state.start)/1000);

if(state.remain<=0){
next();
return;
}

update();
requestAnimationFrame(loop);
}

function next(){
if(!state.isBreak){
state.isBreak=true;
state.duration=300;
state.pomo++;
notify("휴식");
}else{
state.isBreak=false;
state.duration=1500;

if(state.pomo>=4){
state.running=false;
state.pomo=0;
state.cycle++;
notify("사이클 완료");
return;
}
}
state.start=Date.now();
state.remain=state.duration;
loop();
}

function toggle(){
if(!state.current){
alert("과목 선택 먼저");
return;
}

if(state.running){
state.running=false;
}else{
state.start=Date.now()-(state.duration-state.remain)*1000;
state.running=true;
loop();
}
}

function resetAll(){
state={duration:1500,remain:1500,start:null,running:false,isBreak:false,pomo:0,cycle:0,current:null};
subjects={};
render();
update();
}

function skip(){
if(state.isBreak) next();
}

function add(){
let v=input.value;
if(!v) return;
subjects[v]=subjects[v]||0;
state.current=v;
render();
}

function clearAll(){
subjects={};
render();
}

function resetStudy(){
for(let s in subjects) subjects[s]=0;
render();
}

function del(s){
delete subjects[s];
render();
}

function render(){
list.innerHTML="";
for(let s in subjects){
list.innerHTML+=`${s} ${Math.floor(subjects[s]/60)}분 <button onclick="del('${s}')">삭제</button><br>`;
}
}

function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
navigator.vibrate(50);
}

function format(t){
let m=Math.floor(t/60);
let s=t%60;
return m+":"+(s<10?"0":"")+s;
}

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

update();
</script>

</body>
</html>
