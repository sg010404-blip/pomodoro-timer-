<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pomodoro</title>

<link rel="manifest" href="manifest.json">

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:black;
color:white;
font-family:-apple-system;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:10px;
}

.top{
font-size:13px;
opacity:0.7;
margin-top:5px;
}

.title{
font-size:24px;
margin:5px 0 10px;
}

/* 원형 */
.circle-wrap{
position:relative;
width:65vw;
max-width:260px;
aspect-ratio:1/1;
margin:10px auto;
}

svg{
position:absolute;
top:0;left:0;
width:100%;height:100%;
transform:rotate(-90deg);
}

circle{
fill:none;
stroke-width:10;
}

.bg{stroke:#222;}

.progress{
stroke:#3b82f6;
stroke-dasharray:565.48;
transition:0.5s linear;
}

.timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:clamp(32px,8vw,44px);
font-weight:600;
}

/* 버튼 */
.controls{
display:flex;
gap:10px;
margin-top:10px;
width:100%;
max-width:320px;
}

.btn{
flex:1;
text-align:center;
background:#1f2937;
border-radius:14px;
padding:12px 0;
font-size:14px;
transition:transform 0.08s, background 0.2s;
}

.btn:active{
transform:scale(0.9);
background:#374151;
}

.sub{
display:flex;
gap:10px;
margin-top:8px;
width:100%;
max-width:320px;
}

.section{
margin-top:15px;
font-size:16px;
}

input{
width:70%;
padding:10px;
border-radius:10px;
border:none;
margin-top:8px;
}

#list{
margin-top:10px;
width:100%;
max-width:320px;
max-height:180px;
overflow:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="top" id="status">🔥 집중 | 🍅 0회 | 🔁 0사이클</div>
<div class="title">🍅 Pomodoro</div>

<div class="circle-wrap">
<svg>
<circle class="bg" cx="50%" cy="50%" r="45%"/>
<circle id="progress" class="progress" cx="50%" cy="50%" r="45%"/>
</svg>
<div class="timer" id="timer">25:00</div>
</div>

<div class="controls">
<div class="btn" onclick="toggle()">▶</div>
<div class="btn" onclick="resetAll()">🔄</div>
<div class="btn" onclick="skip()">⏭</div>
</div>

<div class="section">과목</div>
<input id="input" placeholder="과목 입력">

<div class="sub">
<div class="btn" onclick="add()">추가</div>
<div class="btn" onclick="clearAll()">전체삭제</div>
</div>

<div class="section">📊 공부시간</div>
<div class="sub">
<div class="btn" onclick="resetStudy()">초기화</div>
</div>

<div id="list"></div>

<script>
let state = JSON.parse(localStorage.getItem("timerState")) || {
duration:1500,
start:null,
remain:1500,
running:false,
isBreak:false,
pomo:0,
cycle:0,
current:null
};

let subjects = JSON.parse(localStorage.getItem("subjects")) || {};
let lastTick=0;

function save(){
localStorage.setItem("timerState",JSON.stringify(state));
}

function haptic(t="light"){
if(navigator.vibrate){
navigator.vibrate(t==="heavy"?60:t==="medium"?30:10);
}
}

function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
haptic("heavy");
}

function fmt(t){
let m=Math.floor(t/60),s=t%60;
return m+":"+(s<10?"0":"")+s;
}

function update(){
timer.innerText=fmt(state.remain);
progress.style.strokeDashoffset=565.48*(1-state.remain/state.duration);

let now=Date.now();
if(state.running && !state.isBreak && state.current){
if(now-lastTick>=1000){
subjects[state.current]=(subjects[state.current]||0)+1;
lastTick=now;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}
}

status.innerText=`🔥 ${state.isBreak?"휴식":"집중"} | 🍅 ${state.pomo}회 | 🔁 ${state.cycle}사이클`;
save();
}

function loop(){
if(!state.running) return;

let now=Date.now();
state.remain = state.duration - Math.floor((now-state.start)/1000);

if(state.remain<=0){next();return;}

update();
requestAnimationFrame(loop);
}

function next(){
if(!state.isBreak){
state.isBreak=true;
state.duration=300;
state.pomo++;
notify("휴식 시작");
}else{
state.isBreak=false;
state.cycle++;
if(state.pomo>=4){
notify("1사이클 완료");
state.running=false;
state.pomo=0;
return;
}
state.duration=1500;
notify("다음 포모도로");
}
state.start=Date.now();
state.remain=state.duration;
loop();
}

function toggle(){
haptic();
if(state.running){
state.running=false;
}else{
state.start=Date.now()-(state.duration-state.remain)*1000;
state.running=true;
loop();
}
save();
}

function resetAll(){
haptic("medium");
state={
duration:1500,start:null,remain:1500,running:false,isBreak:false,pomo:0,cycle:0,current:null
};
subjects={};
localStorage.clear();
render();update();
}

function skip(){
haptic();
if(state.isBreak) next();
}

function add(){
haptic();
let v=input.value;
if(!v) return;
subjects[v]=subjects[v]||0;
state.current=v;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function clearAll(){
subjects={};
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function resetStudy(){
for(let s in subjects) subjects[s]=0;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function del(s){
delete subjects[s];
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function render(){
list.innerHTML="";
for(let s in subjects){
list.innerHTML+=`${s} ${Math.floor(subjects[s]/60)}분 <button onclick="del('${s}')">삭제</button><br>`;
}
}

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

render();update();
if(state.running) loop();
</script>

</body>
</html>
