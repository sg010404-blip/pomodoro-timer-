<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Focus Timer</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
html,body{
margin:0;padding:0;background:#0f172a;color:white;font-family:-apple-system;
}

.app{
min-height:100dvh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.container{
width:100%;
max-width:500px;
padding:10px;
}

/* 원형 */
.circle-wrap{
position:relative;
width:200px;
height:200px;
margin:auto;
}

svg{
transform:rotate(-90deg);
width:200px;height:200px;
}

.circle-bg{
fill:none;stroke:#1e293b;stroke-width:12;
}

.circle-progress{
fill:none;stroke:#3b82f6;stroke-width:12;
stroke-dasharray:565;
stroke-dashoffset:0;
transition:stroke-dashoffset 1s linear;
}

/* 중앙 숫자 */
.timer{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
}

/* 현재시간 */
.clock{
text-align:center;
margin-top:10px;
opacity:0.7;
}

/* 사이클 */
.cycle{
text-align:center;
margin-top:5px;
}

/* 버튼 */
.controls{
display:flex;
gap:8px;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-size:18px;
}

/* 과목 */
.subject-list{
max-height:180px;
overflow:auto;
margin-top:10px;
}

.subject-item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="app">
<div class="container">

<div class="circle-wrap">
<svg>
<circle class="circle-bg" cx="100" cy="100" r="90"/>
<circle id="progress" class="circle-progress" cx="100" cy="100" r="90"/>
</svg>
<div class="timer" id="timer">25:00</div>
</div>

<div class="clock" id="clock"></div>
<div class="cycle" id="cycle">1 / 4</div>

<div class="controls">
<button onclick="toggleTimer()">▶️/⏸</button>
<button onclick="resetAll()">🔄</button>
<button onclick="skipBreak()">⏭</button>
</div>

<input id="subjectInput" placeholder="과목 입력">
<button onclick="addSubject()">추가</button>
<button onclick="resetStudy()">공부시간 리셋</button>

<div class="subject-list" id="list"></div>

</div>
</div>

<script>
let duration=1500;
let startTime=0;
let remaining=1500;
let isRunning=false;
let isBreak=false;
let cycle=1;

let subjects=JSON.parse(localStorage.getItem("subjects"))||{};
let currentSubject=null;

async function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
}

function update(){
let min=Math.floor(remaining/60);
let sec=remaining%60;
timer.innerText=`${min}:${sec<10?"0":""}${sec}`;

let percent=remaining/duration;
progress.style.strokeDashoffset=565*(1-percent);

if(!isBreak && currentSubject){
subjects[currentSubject]+=1;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}
}

function loop(){
if(!isRunning)return;

let now=Date.now();
remaining=duration-Math.floor((now-startTime)/1000);

if(remaining<=0){
nextPhase();
return;
}

update();
requestAnimationFrame(loop);
}

function nextPhase(){
if(!isBreak){
isBreak=true;
duration=300;
notify("휴식 시작");
}else{
isBreak=false;
cycle++;

if(cycle>4){
navigator.vibrate(500);
notify("사이클 완료");
isRunning=false;
cycle=1;
return;
}
duration=1500;
notify("다음 포모도로 시작");
}

startTime=Date.now();
remaining=duration;
cycleEl.innerText=cycle+" / 4";
loop();
}

function toggleTimer(){
if(isRunning){
isRunning=false;
}else{
startTime=Date.now()-(duration-remaining)*1000;
isRunning=true;
loop();
}
}

function resetAll(){
isRunning=false;
duration=1500;
remaining=1500;
cycle=1;
isBreak=false;
subjects={};
localStorage.clear();
render();
update();
}

function resetStudy(){
for(let s in subjects)subjects[s]=0;
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

function skipBreak(){
if(isBreak)nextPhase();
}

function addSubject(){
let val=subjectInput.value;
if(!val)return;
subjects[val]=subjects[val]||0;
currentSubject=val;
render();
}

function render(){
list.innerHTML="";
for(let s in subjects){
let div=document.createElement("div");
div.className="subject-item";
div.innerHTML=`
<span onclick="currentSubject='${s}'">${s}</span>
<span>${Math.floor(subjects[s]/60)}분</span>
<button onclick="del('${s}')">삭제</button>
`;
list.appendChild(div);
}
}

function del(s){
delete subjects[s];
localStorage.setItem("subjects",JSON.stringify(subjects));
render();
}

setInterval(()=>{
let now=new Date();
clock.innerText=now.toLocaleTimeString();
},1000);

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

render();
update();

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
